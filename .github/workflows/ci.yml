# CI — machine-enforces the green gate (constitution Article 3 §3: `main` is
# updated only via a green PR). Runs the same suite as the root `npm test`
# (backend pytest + frontend vitest, plus a tsc typecheck) on every PR and on
# every push to main. See docs/git_strategy.md § CI.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: python -m pytest -q

  frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Run vitest
        run: npm test
