# CI — machine-enforces the green gate (constitution Article 3 §3: `main` is
# updated only via a green PR). Runs the same suite as the root `npm test`
# (backend pytest + frontend vitest, plus a tsc typecheck) on every PR and on
# every push to main. See docs/git_strategy.md § CI.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Supply chain. Security is the project's stated #1 priority, and until
  # 2026-07-19 nothing checked our dependencies at all — the first run found 5
  # advisories in the frontend toolchain, one of them critical. Runs on PRs and
  # on main, because a new advisory can land against code that has not changed:
  # this needs to fail on the world's schedule, not only on ours.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Audit Python dependencies (pip-audit)
        working-directory: backend
        run: |
          python -m pip install --quiet pip-audit
          python -m pip_audit -r requirements.txt --progress-spinner off
      - name: Audit npm dependencies
        working-directory: app
        # Fails on high/critical only. Moderate advisories in dev-only tooling
        # are printed but do not block a merge — blocking on those trains people
        # to ignore the job, which is worse than not having it. Review the
        # moderates at each dependency bump.
        run: |
          npm audit --audit-level=high
          npm audit || true

  # Bound to the merge, not to the milestone-close ceremony. `main` contains
  # only merged work, so nothing on it may still claim to be in flight — the
  # check enforces exactly that. It runs on push to main (the one step no
  # change can route around) and is a no-op on PRs, where in-flight language
  # is correct. See scripts/check_status_freshness.py for the two prior
  # failures that motivated it.
  status-freshness:
    name: Status freshness (main only)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check the status surfaces match reality
        run: python scripts/check_status_freshness.py

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: python -m ruff check app tests
      - name: Run pytest
        run: python -m pytest -q

  frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck
        run: npx tsc -b
      - name: Run vitest
        run: npm test
