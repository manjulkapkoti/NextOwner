[pytest]
# Put backend/ on sys.path so tests import the app as ``app.*`` (matches
# how the app runs). ``pythonpath`` is relative to this file's dir (rootdir).
pythonpath = .
testpaths = tests
addopts = -q
# A per-test ceiling (M6, spec 006 build) — deliberately generous, well above
# any legitimate test's real duration, so this only ever fires on a genuine
# hang. `--timeout-method=thread` dumps every thread's stack on timeout rather
# than just failing silently, which is what turned an apparently-random,
# multi-minute CI/local stall into a one-line diagnosis: two WebSocket
# connections opened in one test each got their own event loop (a
# TestClient-only artifact, `conftest.py`'s `client` fixture docstring has the
# full story), and broadcasting across them was a cross-event-loop `await`
# that hung forever instead of erroring. Fixed at the fixture; this stays as
# the safety net for the next thing that can hang the same way.
timeout = 60
timeout_method = thread
